<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Townsville Pill</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent !important;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 8px;
    min-height: 60px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    white-space: nowrap;
  }

  /* Light-background fallback (uncomment if placing on a light Wix section) */
  /*
  .pill {
    background: rgba(17,24,39,0.05);
    border-color: rgba(17,24,39,0.12);
    color: #374151;
  }
  */

  .dot {
    width: 8px; height: 8px;
    background: #E30613;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(227,6,19,0.2);
    animation: pulse 2.4s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(227,6,19,0.2); }
    50%      { box-shadow: 0 0 0 8px rgba(227,6,19,0); }
  }
</style>
</head>
<body>
  <div class="pill">
    <span class="dot"></span>
    Townsville &bull; Over 20 Years of Experience
  </div>
</body>
</html>
